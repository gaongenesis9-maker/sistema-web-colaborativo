<!DOCTYPE html>
<html>
<head>
    <title>Pedidos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<h1>Pedidos</h1>

<ul id="lista"></ul>

<script src="../js/pedidoServicio.js"></script>
<script>
    const lista = document.getElementById("lista");
    obtenerPedidos().forEach(p => {
        lista.innerHTML += `<li>${p.id} - ${p.producto}</li>`;
    });
</script>

</body>
</html>
