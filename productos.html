<!DOCTYPE html>
<html>
<head>
    <title>Productos</title>

<body>

<h1>Productos</h1>

<ul id="lista"></ul>

<script src="../js/productoServicio.js"></script>

    const lista = document.getElementById("lista");

        lista.innerHTML += `<li>${p.nombre}</li>`;
    });
</script>

</body>
</html>
